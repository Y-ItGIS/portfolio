<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Viewer</title>

    <style>
        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f5f5f5;
        }

        header{
            background:#24292e;
            color:white;
            padding:15px;
            text-align:center;
        }

        iframe{
            width:100%;
            height:calc(100vh - 60px);
            border:none;
        }

        .download{
            position:fixed;
            right:20px;
            bottom:20px;
            background:#0366d6;
            color:white;
            text-decoration:none;
            padding:12px 18px;
            border-radius:8px;
            font-weight:bold;
            box-shadow:0 2px 8px rgba(0,0,0,.2);
        }

        .download:hover{
            background:#024ea2;
        }
    </style>
</head>
<body>

<header>
    <h2>My PDF</h2>
</header>

<iframe src="portfolio_wyattharryman.pdf"></iframe>

<a class="download" href="portfolio_wyattharryman.pdf" download>
    Download PDF
</a>

</body>
</html>
