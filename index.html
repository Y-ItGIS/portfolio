<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wyatt Harryman Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f4f4;
    color:#333;
}

header{
    background:#24292e;
    color:white;
    text-align:center;
    padding:18px;
}

header h1{
    font-size:1.5rem;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:12px;
    padding:16px;
    flex-wrap:wrap;
}

.btn{
    background:#0366d6;
    color:white;
    text-decoration:none;
    padding:12px 22px;
    border-radius:8px;
    font-weight:bold;
    transition:.2s;
}

.btn:hover{
    background:#024ea2;
}

.viewer{
    width:100%;
    height:calc(100vh - 150px);
    padding:0 12px 12px;
}

iframe{
    width:100%;
    height:100%;
    border:none;
    border-radius:10px;
    background:white;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

/* Mobile */
@media (max-width:768px){

    header{
        padding:15px;
    }

    header h1{
        font-size:1.25rem;
    }

    .buttons{
        flex-direction:column;
        align-items:center;
    }

    .btn{
        width:90%;
        max-width:320px;
        text-align:center;
    }

    .viewer{
        height:70vh;
        padding:0 10px 20px;
    }

}
</style>

</head>

<body>

<header>
    <h1>Wyatt Harryman Portfolio</h1>
</header>

<div class="buttons">
    <a class="btn" href="portfolio_wyattharryman.pdf" download>
        Download Portfolio
    </a>
</div>

<div class="viewer">
    <iframe src="portfolio_wyattharryman.pdf"></iframe>
</div>

</body>
</html>
